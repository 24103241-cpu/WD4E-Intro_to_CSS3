<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>

        <nav>

            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg"
                alt="Nike Logo">

            <ul>

                <li><a href="index.html">Home</a></li>
                <li><a href="neighborhood.html">Running</a></li>
                <li><a href="parks.html">Sportswear</a></li>

            </ul>

        </nav>

        <h1>NIKE STORE</h1>

    </header>

    <!-- Main -->

    <main>

        <section class="hero">

            <img src="https://picsum.photos/1400/600?random=10"
                alt="Nike Banner">

            <div class="hero-text">

                <h2>JUST DO IT.</h2>

                <p>
                    Discover the newest Nike collection with premium quality,
                    modern design and maximum comfort.
                </p>

                <a href="neighborhood.html" class="button">
                    SHOP NOW
                </a>

            </div>

        </section>

        <section>

            <h2>Featured Products</h2>

            <div class="products">

                <div class="card">

                    <img src="https://picsum.photos/400/400?random=11"
                        alt="Running Shoe">

                    <h3>Nike Air Max</h3>

                    <p>$149</p>

                </div>

                <div class="card">

                    <img src="https://picsum.photos/400/400?random=12"
                        alt="Training Shoe">

                    <h3>Nike Pegasus</h3>

                    <p>$159</p>

                </div>

                <div class="card">

                    <img src="https://picsum.photos/400/400?random=13"
                        alt="Lifestyle Shoe">

                    <h3>Nike Revolution</h3>

                    <p>$129</p>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer -->

    <footer>

        <p>© 2026 Nike Store | Just Do It.</p>

    </footer>

</body>

</html>
